<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>网页二维码</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #111827, #1e3a8a);
      color: #111827;
      padding: 24px;
    }
    .card {
      width: min(100%, 420px);
      background: #fff;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .28);
      text-align: center;
    }
    h1 { margin: 0 0 10px; font-size: 26px; }
    p { margin: 0 0 20px; color: #4b5563; line-height: 1.6; }
    .qr-wrap {
      width: 260px;
      height: 260px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      background: #f9fafb;
    }
    #qr { width: 220px; height: 220px; }
    input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
    }
    input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    button {
      width: 100%;
      margin-top: 12px;
      border: 0;
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: #2563eb;
      cursor: pointer;
    }
    button:active { transform: translateY(1px); }
    .hint { margin-top: 14px; font-size: 13px; color: #6b7280; word-break: break-all; }
  </style>
</head>
<body>
  <main class="card">
    <h1>扫码打开这个网页</h1>
    <p>二维码默认指向当前页面地址。部署到公网后，别人扫码即可进入这个页面。</p>
    <div class="qr-wrap">
      <img id="qr" alt="当前网页二维码">
    </div>
    <input id="urlInput" type="url" placeholder="输入要生成二维码的网址">
    <button id="makeBtn">生成二维码</button>
    <div class="hint" id="currentUrl"></div>
  </main>

  <script>
    const qr = document.getElementById('qr');
    const input = document.getElementById('urlInput');
    const currentUrl = document.getElementById('currentUrl');
    const makeBtn = document.getElementById('makeBtn');

    function makeQr(url) {
      const normalized = url.trim();
      if (!normalized) return;
      qr.src = 'https://api.qrserver.com/v1/create-qr-code/?size=440x440&data=' + encodeURIComponent(normalized);
      input.value = normalized;
      currentUrl.textContent = '当前二维码链接：' + normalized;
    }

    makeBtn.addEventListener('click', () => makeQr(input.value));
    input.addEventListener('keydown', event => {
      if (event.key === 'Enter') makeQr(input.value);
    });

    makeQr(location.href);
  </script>
</body>
</html>
